<!DOCTYPE html>
<html lang="pt-BR">

    <style>

        .highscore-panel { flex: 1; min-width: 240px; background: #0f1a1f; border-radius: 40px; padding: 20px; box-shadow: 0 15px 25px rgba(0,0,0,0.5); border: 1px solid #2c4c5c; }
        h1 { font-size: 2rem; margin: 0 0 8px; background: linear-gradient(135deg, #FFE6B0, #FFB347); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .sub { color: #b3e4ff; margin-bottom: 25px; border-left: 3px solid #ffb347; padding-left: 12px; }
        .card-question { background: #071217c9; border-radius: 32px; padding: 20px; margin: 20px 0; border: 1px solid #ffb34755; }
        .question-text { font-size: 1.8rem; font-weight: bold; color: #ffefcf; text-align: center; background: #00000033; padding: 15px; border-radius: 24px; overflow-x: auto; }
        .stats { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 12px; background: #00000066; padding: 12px 18px; border-radius: 60px; margin-bottom: 20px; }
        .stat { background: #1e2f3a; padding: 5px 14px; border-radius: 40px; font-weight: bold; color: #ffd966; }
        .stat span { color: white; }
        .input-area { display: flex; flex-direction: column; gap: 12px; margin-top: 10px; }
        .answer-input { background: #0b171f; border: 2px solid #3c6e8c; border-radius: 60px; padding: 14px 20px; font-size: 1.2rem; color: #f0f9ff; outline: none; }
        .answer-input:focus { border-color: #ffb347; box-shadow: 0 0 12px #ffb34766; }
        button { background: #ff914d; border: none; border-radius: 60px; padding: 12px 20px; font-weight: bold; font-size: 1.1rem; cursor: pointer; box-shadow: 0 4px 0 #a34100; transform: translateY(-2px); transition: 0.05s linear; color: #1e2a2f; }
        button:active { transform: translateY(2px); box-shadow: 0 1px 0 #a34100; }
        button.secondary { background: #2c5f7a; box-shadow: 0 4px 0 #153e52; color: white; }
        .feedback { background: #000000aa; border-radius: 32px; padding: 14px; margin: 18px 0 0; text-align: center; border-left: 6px solid #ffb347; color: white; }
        .points-badge { background: #2f4858; display: inline-block; border-radius: 30px; padding: 6px 16px; font-size: 0.9rem; }
        .highscore-list { list-style: none; padding: 0; margin: 15px 0; color: white;}
        .highscore-list li { background: #1f2f38; margin: 8px 0; padding: 8px 15px; border-radius: 60px; display: flex; justify-content: space-between; font-weight: bold; }
        .reset-btn { background: #4e3b2c; box-shadow: none; font-size: 0.8rem; margin-top: 15px; width: 100%; }
        .newgame-btn { background: #38b000; box-shadow: 0 4px 0 #1f6e00; margin-top: 15px; width: 100%; }
        .final-message { background: #0e2a2f; border-radius: 28px; padding: 15px; margin: 15px 0; text-align: center; font-weight: bold; }
        .save-area { display: flex; gap: 10px; margin-top: 10px; }
        .save-area input { flex: 2; background: #021016; border: 1px solid #ffb347; border-radius: 40px; padding: 8px 16px; color: white; }
        @media (max-width: 750px) { .quiz-panel, .highscore-panel { flex: 1 1 100%; } .question-text { font-size: 1.3rem; } }
    </style>
</head>
<body>
<div class="game-container">
    <div class="quiz-panel">
        <div style="display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap;">
            <h1>Lista 5 de Matemática</h1>
            <div class="points-badge" id="rankingStatus">🌍 Ranking da sala</div>
        </div>
        <div class="sub">Potência e Raiz</div>
        <div class="stats">
            <div class="stat">💯 TOTAL: <span id="totalScore">0</span> pts</div>
            <div class="stat">⭐ PERGUNTA: <span id="currentQValue">10.00</span> pts</div>
            <div class="stat">📊 PROGRESSO: <span id="progressCounter">0</span>/<span id="totalQuestions">15</span></div>
        </div>
        <div class="card-question">
            <div class="question-text" id="questionText">Carregando...</div>
            <div class="input-area">
                <input type="text" id="answerInput" class="answer-input" placeholder="Digite sua resposta (número ou fração ex: 1/4)">
                <button id="submitBtn">✅ RESPONDER</button>
                <button id="newGameBtn" class="secondary">🔄 NOVO JOGO</button>
            </div>
            <div id="feedback" class="feedback">✨ Cada erro reduz o valor da questão pela metade. Ranking global via Google Sheets!</div>
        </div>
        <div id="finalArea"></div>
    </div>
    <div class="highscore-panel">
        <h2 style="font-size: 1.5rem; color: white;">🏆 HIGHSCORES</h2>
        <ul id="highscoreList" class="highscore-list"><li>Carregando ranking...</li></ul>
        <button id="refreshRankBtn" class="reset-btn" style="background:#2c5f7a;">🔄 ATUALIZAR RANKING</button>
        <div style="font-size: 0.7rem; margin-top: 12px; text-align: center; color:#7f9faa;" id="rankSourceMsg">
            📡 Conectando...
        </div>
    </div>
</div>

<script>
    // ========== CONFIGURAÇÃO ==========
    // 🔻 COLE A URL DO SEU WEB APP AQUI 🔻
    const GOOGLE_SHEETS_API_URL = "https://script.google.com/macros/s/AKfycbwul7qTyyjwtx1cl1AAhGKkk7u-8cJPduWtoeY5gbqyJn-J6MynIgsrU-gRXR_Smjc/exec";
    // 🔺🔺🔺 SUBSTITUA PELA URL GERADA NO PASSO 3 🔺🔺🔺
    
    let rankingOnline = true; // se falhar, usa fallback localStorage
    
    // ========== FUNÇÕES DE RANKING ==========
    async function carregarRanking() {
        const listaEl = document.getElementById("highscoreList");
        const msgEl = document.getElementById("rankSourceMsg");
        listaEl.innerHTML = '<li>Carregando...</li>';
        
        try {
            const response = await fetch(GOOGLE_SHEETS_API_URL);
            if (!response.ok) throw new Error("HTTP " + response.status);
            const scores = await response.json();
            if (scores.length === 0) {
                listaEl.innerHTML = '<li>✨ Nenhuma pontuação ainda. Seja o primeiro!</li>';
            } else {
                listaEl.innerHTML = scores.map((hs, idx) => 
                    `<li><span>${idx+1}. ${hs.nome}</span><span>${hs.pontuacao.toFixed(2)} pts</span></li>`
                ).join('');
            }
            msgEl.innerHTML = "🌍 Ranking da sala";
            rankingOnline = true;
        } catch (err) {
            console.error("Erro ao carregar ranking online:", err);
            // Fallback: localStorage
            const localScores = JSON.parse(localStorage.getItem("potenciaLocalRanking") || "[]");
            localScores.sort((a,b) => b.score - a.score);
            if (localScores.length === 0) {
                listaEl.innerHTML = '<li>💾 Nenhuma pontuação local. Jogue e salve!</li>';
            } else {
                listaEl.innerHTML = localScores.slice(0,10).map((hs, idx) => 
                    `<li><span>${idx+1}. ${hs.name}</span><span>${hs.score.toFixed(2)} pts</span></li>`
                ).join('');
            }
            msgEl.innerHTML = "💾 Ranking local (navegador) - Fallback ativado";
            rankingOnline = false;
        }
    }
    
    async function salvarPontuacao(nome, pontuacao) {
    try {
        const url = `${GOOGLE_SHEETS_API_URL}?nome=${encodeURIComponent(nome)}&pontuacao=${pontuacao}`;
        const response = await fetch(url);
        const resultado = await response.json();
        if (resultado.status === "ok") {
            console.log("✅ Pontuação salva na planilha!");
            return true;
        } else {
            throw new Error(resultado.message || "Erro desconhecido");
        }
    } catch (err) {
        console.error("Erro ao salvar online:", err);
        // Fallback localStorage
        let localScores = JSON.parse(localStorage.getItem("potenciaLocalRanking") || "[]");
        localScores.push({ name: nome, score: parseFloat(pontuacao.toFixed(2)), date: new Date().toISOString() });
        localScores.sort((a,b) => b.score - a.score);
        if (localScores.length > 10) localScores = localScores.slice(0,10);
        localStorage.setItem("potenciaLocalRanking", JSON.stringify(localScores));
        return true;
    }
}
    
    // ========== BANCO DE PERGUNTAS ==========
const QUESTIONS_BANK = [
        // FÁCIL
        { text: "Calcule \\(2^{3} \\times 2^{2}\\)", answerNum: 32, difficulty: "easy" },
        { text: "Qual é o valor de \\(3^{2} \\times 3^{3}\\)?", answerNum: 243, difficulty: "easy" },
        { text: "Resolva \\(5^{4} \\div 5^{2}\\)", answerNum: 25, difficulty: "easy" },
        { text: "Simplifique \\( (2^{3})^{2} \\)", answerNum: 64, difficulty: "easy" },
        { text: "Calcule \\(7^{0} \\times 7^{2}\\)", answerNum: 49, difficulty: "easy" },
        { text: "Determine \\(10^{5} \\div 10^{3}\\)", answerNum: 100, difficulty: "easy" },
        { text: "Quanto vale \\( (-3)^{2} \\)?", answerNum: 9, difficulty: "easy" },
        { text: "Resolva \\( (\\frac{1}{2})^{3} \\)", answerNum: 0.125, difficulty: "easy" },
        { text: "Calcule \\(4^{3} \\div 4^{1}\\)", answerNum: 16, difficulty: "easy" },
        { text: "Qual é o resultado de \\( (0.5)^{2} \\)?", answerNum: 0.25, difficulty: "easy" },
        { text: "Calcule \\(2^3 \\times 2^4\\)", answerNum: 128, difficulty: "easy" },
        { text: "Qual o valor de \\(9^{1/2}\\)?", answerNum: 3, difficulty: "easy" },
        { text: "Resolva \\((2^2)^3\\)", answerNum: 64, difficulty: "easy" },
        { text: "Quanto é \\(4^{-2}\\)?", answerNum: 0.0625, difficulty: "easy" },
        { text: "Raiz quadrada de \\(16\\)", answerNum: 4, difficulty: "easy" },
        { text: "Calcule \\(8^{2/3}\\)", answerNum: 4, difficulty: "easy" },
        { text: "Simplifique \\(2^5 / 2^3\\)", answerNum: 4, difficulty: "easy" },
        { text: "Quanto vale \\(5^0\\)?", answerNum: 1, difficulty: "easy" },
        { text: "Raiz cúbica de \\(27\\)", answerNum: 3, difficulty: "easy" },
        { text: "\\(10^3 \\times 10^{-2}\\)", answerNum: 10, difficulty: "easy" },
        { text: "\\(16^{1/4}\\)", answerNum: 2, difficulty: "easy" },
        { text: "\\(0^5\\)", answerNum: 0, difficulty: "easy" },
        { text: "\\((-2)^3\\)", answerNum: -8, difficulty: "easy" },
        { text: "\\((-2)^2\\)", answerNum: 4, difficulty: "easy" },
        { text: "\\(2^{-3}\\)", answerNum: 0.125, difficulty: "easy" },
        { text: "Raiz quadrada de \\(0.25\\)", answerNum: 0.5, difficulty: "easy" },
        { text: "Raiz quarta de \\(16\\)", answerNum: 2, difficulty: "easy" },

        // MÉDIO
        { text: "Calcule \\(27^{\\frac{2}{3}}\\)", answerNum: 9, difficulty: "medium" },
        { text: "Resolva \\(16^{\\frac{3}{4}}\\)", answerNum: 8, difficulty: "medium" },
        { text: "Determine \\( (\\frac{8}{27})^{\\frac{2}{3}} \\)", answerNum: 4/9, difficulty: "medium" }, // 4/9
        { text: "Simplifique \\( \\frac{2^{n+2}}{2^{n-1}} \\)", answerNum: 8, difficulty: "medium" },
        { text: "Calcule \\( (4^{\\frac{1}{2}})^{3} \\)", answerNum: 8, difficulty: "medium" },
        { text: "Resolva \\( 9^{-\\frac{1}{2}} \\)", answerNum: 1/3, difficulty: "medium" }, // 1/3
        { text: "Determine o valor de \\( (\\frac{1}{4})^{-\\frac{1}{2}} \\)", answerNum: 2, difficulty: "medium" },
        { text: "Simplifique \\( (a^{3} \\cdot a^{5}) \\div a^{4} \\) (para a=2)", answerNum: 16, difficulty: "medium" },
        { text: "Calcule \\( 32^{\\frac{2}{5}} \\)", answerNum: 4, difficulty: "medium" },
        { text: "Resolva \\( (3^{2})^{\\frac{1}{2}} \\times 3^{1} \\)", answerNum: 9, difficulty: "medium" },
        { text: "\\(27^{2/3}\\)", answerNum: 9, difficulty: "medium" },
        { text: "\\( (\\frac{1}{2})^{-2} \\)", answerNum: 4, difficulty: "medium" },
        { text: "\\(9^{3/2}\\)", answerNum: 27, difficulty: "medium" },
        { text: "\\(10^{-1}\\)", answerNum: 0.1, difficulty: "medium" },
        { text: "\\(2^{10} / 2^8\\)", answerNum: 4, difficulty: "medium" },
        { text: "Raiz quinta de \\(32\\)", answerNum: 2, difficulty: "medium" },
        { text: "\\((-1)^{100}\\)", answerNum: 1, difficulty: "medium" },

        // DIFÍCIL
        { text: "Resolva \\( \\left( \\frac{9}{16} \\right)^{-\\frac{3}{2}} \\)", answerNum: 64/27, difficulty: "hard" }, // 64/27
        { text: "Simplifique \\( \\frac{ (2^{3})^{4} \\cdot 2^{-5} }{ 2^{6} } \\)", answerNum: 2, difficulty: "hard" },
        { text: "Calcule \\( (0.125)^{-\\frac{2}{3}} \\)", answerNum: 4, difficulty: "hard" },
        { text: "Determine \\( (\\frac{27}{8})^{\\frac{2}{3}} \\)", answerNum: 9/4, difficulty: "hard" }, // 9/4
        { text: "Resolva \\( \\frac{2^{x+1} \\cdot 4^{1-x}}{8^{x}} \\) para x = 3", answerNum: 0.015625, difficulty: "hard" },
        { text: "Calcule \\( (16^{\\frac{3}{4}} \\div 8^{\\frac{2}{3}}) \\)", answerNum: 2, difficulty: "hard" },
        { text: "Simplifique \\( \\frac{ (3^{2})^{3} \\cdot 27^{-1} }{ 9^{2} } \\)", answerNum: 1/3, difficulty: "hard" }, // 3^6 * 3^-3 / 3^4 = 3^-1 corrigido para 3 se for simplificação específica, mas o valor real é 1/3 ou 0.333. REVISÃO: (3^6 * 3^-3)/3^4 = 3^3/3^4 = 3^-1 = 0.333.
        { text: "Determine \\( \\left( \\frac{1}{81} \\right)^{-\\frac{3}{4}} \\)", answerNum: 27, difficulty: "hard" },
        { text: "Resolva \\( 4^{\\frac{3}{2}} \\times 8^{-\\frac{2}{3}} \\)", answerNum: 2, difficulty: "hard" },
        { text: "Calcule \\( (2^{\\frac{1}{2}} \\cdot 2^{\\frac{3}{2}})^{2} \\)", answerNum: 16, difficulty: "hard" },
        { text: "Resolva \\( 27^{\\frac{4}{3}} \\)", answerNum: 81, difficulty: "hard" },
        { text: "Simplifique \\( \\frac{2^{n+2} \\cdot 4^{n-1}}{8^{n}} \\)", answerNum: 1, difficulty: "hard" },

        // MUITO DIFÍCIL
        { text: "Determine \\( (256^{\\frac{1}{4}})^{3/2} \\)", answerNum: 8, difficulty: "very_hard" }, // Raiz(27) ou 3^(3/2)
        { text: "Resolva \\( (\\frac{8}{27})^{-\\frac{2}{3}} \\times (\\frac{9}{4})^{\\frac{1}{2}} \\)", answerNum: 27/8, difficulty: "very_hard" }, // (9/4) * (3/2) = 27/8 = 3.375
        { text: "Simplifique \\( \\frac{2^{n+3} \\cdot 4^{n-1}}{8^{n} \\cdot 16^{n-2}} \\) para n = 2", answerNum: 2, difficulty: "very_hard" },
        { text: "Calcule \\( (0.25)^{-\\frac{3}{2}} \\div (0.125)^{\\frac{2}{3}} \\)", answerNum: 32, difficulty: "very_hard" },
        { text: "Determine o valor de \\( (\\frac{16}{81})^{-\\frac{3}{4}} \\cdot (\\frac{27}{8})^{\\frac{2}{3}} \\)", answerNum: 243/32, difficulty: "very_hard" }, // (27/8) * (9/4) = 243/32 = 7.59375
        { text: "Resolva \\( \\frac{ (2^{x} \\cdot 4^{x-1}) }{ 8^{x+1} } \\) para x = 1", answerNum: 1/32, difficulty: "very_hard" }, // 2^1 * 4^0 / 8^2 = 2/64 = 1/32
        { text: "Calcule \\( (\\frac{1}{9})^{-\\frac{3}{2}} \\times (\\frac{1}{27})^{-\\frac{2}{3}} \\)", answerNum: 243, difficulty: "very_hard" }, // 27 * 9 = 243
        { text: "Simplifique \\( \\frac{ (a^{2} \\cdot b^{-1})^{3} }{ (a^{-1} \\cdot b^{2})^{-2} } \\) para a=2, b=4", answerNum: 64, difficulty: "very_hard" }, // (a^6 * b^-3) / (a^2 * b^-4) = a^4 * b^1 = 16 * 4 = 64. REVISADO: 64.
        { text: "Resolva \\( (\\frac{3}{4})^{-2} \\times (\\frac{16}{9})^{\\frac{1}{2}} \\)", answerNum: 64/27, difficulty: "very_hard" }, // (16/9) * (sqrt(8)/3)
        { text: "Determine \\( \\frac{ (2^{\\frac{1}{2}} \\cdot 4^{\\frac{3}{4}}) }{ (8^{\\frac{2}{3}}) } \\)", answerNum: 1, difficulty: "very_hard" }, // (2^0.5 * 2^1.5) / 2^2 = 2^2 / 2^2 = 1
        { text: "Calcule \\( (\\frac{1}{2})^{-3} \\times (\\frac{1}{4})^{\\frac{1}{2}} \\div (\\frac{1}{8})^{-\\frac{2}{3}} \\)", answerNum: 1, difficulty: "very_hard" }, // (8 * 0.5) / 4 = 1
        { text: "Resolva \\( \\frac{2^{x+1} \\cdot 4^{1-x}}{8^{x}} \\) para x=2", answerNum: 0.125, difficulty: "very_hard" }
    ];
    
    const QUESTIONS_PER_GAME = 15;
    const BASE_POINTS = 10;
    const PASS_THRESHOLD = 100;
    const DIFFICULTY_CONFIG = { easy:8, medium:4, hard:2, very_hard:1 };
    
    let currentGame = [];
    let currentIndex = 0;
    let currentValue = BASE_POINTS;
    let totalPoints = 0;
    let gameActive = true;
    let gameFinished = false;
    let attempts = 0;
    
    // DOM elements
    const questionEl = document.getElementById("questionText");
    const totalSpan = document.getElementById("totalScore");
    const qValueSpan = document.getElementById("currentQValue");
    const progressSpan = document.getElementById("progressCounter");
    const answerInput = document.getElementById("answerInput");
    const submitBtn = document.getElementById("submitBtn");
    const newGameBtn = document.getElementById("newGameBtn");
    const feedbackDiv = document.getElementById("feedback");
    const finalArea = document.getElementById("finalArea");
    const refreshRankBtn = document.getElementById("refreshRankBtn");
    
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }
    
    function getQuestionsByDifficulty() {
        const groups = {
            easy: QUESTIONS_BANK.filter(q => q.difficulty === "easy"),
            medium: QUESTIONS_BANK.filter(q => q.difficulty === "medium"),
            hard: QUESTIONS_BANK.filter(q => q.difficulty === "hard"),
            very_hard: QUESTIONS_BANK.filter(q => q.difficulty === "very_hard")
        };
        const selected = [];
        for (let [diff, need] of Object.entries(DIFFICULTY_CONFIG)) {
            let pool = [...groups[diff]];
            if (pool.length < need) {
                while(pool.length < need) pool = pool.concat(groups[diff]);
            }
            const shuffledPool = shuffleArray(pool);
            selected.push(...shuffledPool.slice(0, need));
        }
        return shuffleArray(selected);
    }
    
    function renderMath() {
        if (window.MathJax) MathJax.typesetPromise([questionEl]).catch(e=>console.log(e));
    }
    
    function updateUI() {
        if (!gameActive || gameFinished) return;
        if (currentIndex < currentGame.length) {
            questionEl.innerHTML = currentGame[currentIndex].text;
            renderMath();
            progressSpan.innerText = currentIndex;
            qValueSpan.innerText = currentValue.toFixed(2);
            totalSpan.innerText = totalPoints.toFixed(2);
            let extra = document.getElementById("extraInfo");
            if (!extra) {
                extra = document.createElement("div");
                extra.id = "extraInfo";
                extra.className = "progress";
                document.querySelector(".card-question").appendChild(extra);
            }
            extra.innerHTML = `🔁 tentativas: ${attempts} | dificuldade: ${currentGame[currentIndex].difficulty}`;
        } else finishGame();
    }
    
    function finishGame() {
        if (gameFinished) return;
        gameActive = false;
        gameFinished = true;
        submitBtn.disabled = true;
        answerInput.disabled = true;
        const finalScore = totalPoints;
        const passed = finalScore >= PASS_THRESHOLD;
        const percent = (finalScore / (QUESTIONS_PER_GAME * BASE_POINTS)) * 100;
        let html = `<div class="final-message">
            <strong>🏁 FIM DE JOGO!</strong><br>
            🎯 Pontuação: ${finalScore.toFixed(2)} / 150<br>
            📈 ${percent.toFixed(1)}%<br>
            ${passed ? '✅ APROVADO! ✅' : '❌ REPROVADO ❌'}
        </div>
        <div class="save-area">
            <input type="text" id="playerName" placeholder="Seu nome (ranking mundial)" maxlength="20">
            <button id="saveRankBtn">💾 SALVAR PONTUAÇÃO</button>
        </div>`;
        finalArea.innerHTML = html;
        const saveBtn = document.getElementById("saveRankBtn");
        if (saveBtn) saveBtn.onclick = async () => {
            const nameInput = document.getElementById("playerName");
            let name = nameInput.value.trim();
            if (!name) name = "Anônimo";
            const ok = await salvarPontuacao(name, finalScore);
            feedbackDiv.innerHTML = ok ? "🏅 Pontuação salva no ranking global!" : "❌ Erro ao salvar. Tente novamente.";
            if (ok) carregarRanking();
            saveBtn.disabled = true;
        };
        feedbackDiv.innerHTML = passed ? "Parabéns! Você atingiu a meta!" : "Que pena! Tente outra vez.";
    }
    
    function nextQuestion() {
        currentIndex++;
        if (currentIndex < currentGame.length) {
            currentValue = BASE_POINTS;
            attempts = 0;
            updateUI();
            answerInput.value = "";
            answerInput.disabled = false;
            submitBtn.disabled = false;
            feedbackDiv.innerHTML = "✅ Acertou! Próxima pergunta.";
        } else finishGame();
    }
    
    function parseAnswer(str) {
        let s = str.trim().replace(/,/g, '.');
        if (s.includes('/')) {
            let parts = s.split('/');
            if (parts.length === 2) {
                let num = parseFloat(parts[0]), den = parseFloat(parts[1]);
                if (!isNaN(num) && !isNaN(den) && den !== 0) return num/den;
            }
        }
        return parseFloat(s);
    }
    
    function handleAnswer() {
        if (!gameActive || gameFinished) return;
        const raw = answerInput.value.trim();
        if (!raw) { feedbackDiv.innerHTML = "Digite uma resposta!"; return; }
        const userNum = parseAnswer(raw);
        const currentQ = currentGame[currentIndex];
        const correct = currentQ.answerNum;
        if (Math.abs(userNum - correct) < 0.001) {
            totalPoints += currentValue;
            totalSpan.innerText = totalPoints.toFixed(2);
            feedbackDiv.innerHTML = `🎉 Correto! +${currentValue.toFixed(2)} pontos.`;
            nextQuestion();
        } else {
            attempts++;
            currentValue /= 2;
            if (currentValue < 0.001) currentValue = 0;
            qValueSpan.innerText = currentValue.toFixed(4);
            feedbackDiv.innerHTML = `❌ Errado! Valor caiu para ${currentValue.toFixed(2)} pts. Tente novamente.`;
            answerInput.value = "";
            answerInput.focus();
            updateUI();
        }
    }
    
    function startNewGame() {
        currentGame = getQuestionsByDifficulty();
        if (currentGame.length !== 10) console.warn("Ajuste nas perguntas");
        currentIndex = 0;
        currentValue = BASE_POINTS;
        totalPoints = 0;
        gameActive = true;
        gameFinished = false;
        attempts = 0;
        submitBtn.disabled = false;
        answerInput.disabled = false;
        answerInput.value = "";
        finalArea.innerHTML = "";
        updateUI();
        feedbackDiv.innerHTML = "✨ Novo jogo! Cada erro reduz o valor pela metade. ✨";
        totalSpan.innerText = "0";
        progressSpan.innerText = "0";
        qValueSpan.innerText = BASE_POINTS.toFixed(2);
    }
    
    // Eventos
    submitBtn.onclick = handleAnswer;
    newGameBtn.onclick = startNewGame;
    refreshRankBtn.onclick = () => { carregarRanking(); feedbackDiv.innerHTML = "🔄 Ranking atualizado!"; };
    answerInput.addEventListener("keypress", (e) => { if(e.key === "Enter") handleAnswer(); });
    
    // Inicialização
    carregarRanking();
    startNewGame();
</script>
</body>
</html>
